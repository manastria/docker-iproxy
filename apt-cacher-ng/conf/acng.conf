CacheDir: /var/cache/apt-cacher-ng
LogDir: /var/log/apt-cacher-ng
Port: 3142
ReportPage: acng-report.html

SocketPath: /run/apt-cacher-ng/socket
PidFile: /run/apt-cacher-ng/pid

# Proxy amont (si obligatoire)
Proxy: http://172.16.0.1:3128

# Réseau instable : timeouts raisonnables + retries
NetworkTimeout: 25
DlMaxRetries: 5

# DNS / IPv6 foireux : bascule plus vite
DnsCacheSeconds: 1800
FastTimeout: 4

# Limites de threads (à adapter à ta RAM)
MaxStandbyConThreads: 16
MaxConThreads: 200

# HTTPS : au minimum pass-through (proxy mais pas cache)
PassThroughPattern: .*

# Force la revalidation des fichiers d'index (InRelease, Release, Packages)
# au lieu de les servir depuis le cache sans vérification
ExThreshold: 0
